<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>先生クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e16;--card:#18182a;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#777}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text)}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.hdr{background:#13131e;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-back{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:2px 6px}
.hdr-title{font-size:1rem;font-weight:900;color:white;flex:1}
.hdr-act{background:none;border:none;color:#ffd700;font-size:0.82rem;font-weight:700;cursor:pointer}
.body{flex:1;overflow-y:auto;padding:16px 16px 40px;-webkit-overflow-scrolling:touch}
.btn{width:100%;padding:14px;border:none;border-radius:13px;font-family:inherit;font-size:1rem;font-weight:900;cursor:pointer;color:white;margin-bottom:10px;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:white;font-family:inherit;font-size:.95rem;margin-bottom:16px;outline:none}
.lbl{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:6px;display:block}
.chip{padding:7px 14px;border-radius:99px;border:2px solid rgba(255,255,255,.12);background:var(--card);color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px;transition:all .15s}
.chip.active-shakai{border-color:#ff6666;background:rgba(255,80,80,.2);color:#ff6666}
.chip.active-sansu{border-color:#ffaa44;background:rgba(255,170,30,.2);color:#ffaa44}
.chip.active-kokugo{border-color:#6699ff;background:rgba(30,100,200,.2);color:#6699ff}
.chip.active-rika{border-color:#44cc88;background:rgba(30,160,80,.2);color:#44cc88}
.upl{width:100%;border:2px dashed rgba(255,255,255,.15);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;position:relative;margin-bottom:14px;transition:border-color .2s}
.upl.has-files{border-color:#44cc88}
.upl input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.log-wrap{background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:12px;font-size:.78rem;font-family:monospace;max-height:200px;overflow-y:auto;line-height:1.8}
.log-ok{color:#44cc88}
.log-err{color:#ff6666}
.log-info{color:#ffd700}
.prog-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ff6b35);transition:width .4s}
.thumb-strip{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:6px}
.thumb-strip img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0}
.thumb-more{width:60px;height:60px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;font-size:.75rem}
/* HOME */
#home{background:radial-gradient(ellipse at 30% 20%,#1a0a2e,transparent 55%),radial-gradient(ellipse at 80% 80%,#0a1a2e,transparent 50%),var(--bg)}
.home-logo{font-size:2rem;font-weight:900;color:#ffd700;text-align:center;padding:28px 18px 4px}
.home-sub{color:var(--muted);font-size:.75rem;letter-spacing:2px;text-align:center;margin-bottom:20px}
.test-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
.tc-name{font-size:1rem;font-weight:900;margin-bottom:4px}
.tc-meta{font-size:.72rem;color:var(--muted)}
.tc-del{background:none;border:none;color:#555;cursor:pointer;font-size:1rem}
.new-btn{width:100%;padding:14px;border:2px dashed rgba(255,255,255,.15);border-radius:13px;background:transparent;color:var(--muted);font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px}
/* DETAIL */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.subj-card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .18s}
.subj-card:active{transform:scale(.97)}
.subj-card img{width:100%;height:120px;object-fit:cover;object-position:center top;display:block}
.subj-card .si{padding:8px 10px}
.subj-card .si-name{font-size:.65rem;opacity:.6}
.subj-card .si-teacher{font-size:.88rem;font-weight:900}
.subj-card .si-count{font-size:.65rem;color:var(--muted);margin-top:2px}
/* INTRO */
#intro{position:relative;overflow:hidden}
.intro-bg{position:absolute;inset:0}
.intro-char{position:absolute;bottom:185px;left:50%;transform:translateX(-50%);width:240px}
.intro-char img{width:100%}
.intro-bubble{position:relative;width:100%;background:#1a1a2e;border-top:2px solid rgba(255,255,255,.1);padding:18px 20px 28px;margin-top:auto}
/* QUIZ */
#quiz{position:relative;overflow:hidden}
.quiz-top{position:absolute;top:0;left:0;right:0;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;background:linear-gradient(to bottom,rgba(14,14,22,.95),transparent)}
.streak-pill{background:rgba(255,80,80,.2);border:1px solid rgba(255,80,80,.4);border-radius:99px;padding:3px 10px;font-size:.74rem;font-weight:700;color:#ff8888}
.qprog{position:absolute;top:50px;left:0;right:0;height:3px;background:rgba(255,255,255,.08);z-index:10}
.qprog-fill{height:100%;background:linear-gradient(90deg,#4d96ff,#44cc88);transition:width .4s}
.quiz-char{position:absolute;bottom:295px;left:50%;transform:translateX(-50%);width:200px}
.quiz-char img{width:100%}
.quiz-panel{position:relative;width:100%;background:#13131e;border-top:1px solid rgba(255,255,255,.08);padding:13px 14px 20px;z-index:5;min-height:290px;margin-top:auto}
.qtag{font-size:.66rem;font-weight:700;letter-spacing:1px;margin-bottom:5px;opacity:.7}
.qtxt{font-size:.98rem;font-weight:700;line-height:1.6;margin-bottom:11px;min-height:48px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.cbtn{background:#1e1e32;border:2px solid rgba(255,255,255,.1);border-radius:11px;padding:10px 7px;color:var(--text);font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1.4;text-align:center;transition:all .15s}
.cbtn:active:not(:disabled){transform:scale(.96)}
.cbtn.correct{background:rgba(68,200,120,.25);border-color:#44cc88}
.cbtn.wrong{background:rgba(255,80,80,.2);border-color:#ff5555}
.cbtn:disabled{cursor:default}
.fbtxt{min-height:30px;text-align:center;font-size:.85rem;font-weight:700;padding:4px;border-radius:8px;display:none;margin-bottom:8px}
.fbtxt.ok{color:#44cc88;background:rgba(68,200,120,.1);display:block}
.fbtxt.ng{color:#ff8888;background:rgba(255,80,80,.1);display:block}
/* RESULT */
#result{justify-content:center;align-items:center;overflow-y:auto}
.res-char{width:180px;margin-bottom:4px}
.res-char img{width:100%}
.res-title{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:2px}
.res-pts{font-size:2.6rem;font-weight:900;color:#ffd700;text-align:center}
.res-ptslbl{color:var(--muted);font-size:.72rem;text-align:center;margin-bottom:16px}
.res-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;width:100%;max-width:340px}
.rstat{background:var(--card);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.rstat .rl{font-size:.62rem;color:var(--muted)}
.rstat .rv{font-size:1.25rem;font-weight:900;margin-top:2px}
.res-msg{font-size:.88rem;font-weight:700;text-align:center;margin-bottom:16px;color:#bbb;padding:0 16px}
/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:99px;font-size:.85rem;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;white-space:nowrap;color:white}
.toast.show{opacity:1}
/* CONFETTI */
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.cf{position:absolute;top:-20px;border-radius:2px;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadeIn .3s ease}
</style>
</head>
<body>

<div class="confetti-c" id="ccont"></div>
<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-logo">⚡ 先生クイズ</div>
  <div class="home-sub">テストを選ぼう</div>
  <div class="body">
    <div id="test-list"></div>
    <button class="new-btn" onclick="goNewTest()">＋ 新しいテストを作る</button>
  </div>
</div>

<!-- TEST DETAIL -->
<div class="screen" id="testdetail">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('home')">←</button>
    <div class="hdr-title" id="td-title"></div>
    <button class="hdr-act" onclick="goAddPhotos()">📷 追加</button>
  </div>
  <div class="body">
    <div class="subj-grid" id="td-grid"></div>
  </div>
</div>

<!-- NEW TEST -->
<div class="screen" id="newtest">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('home')">←</button>
    <div class="hdr-title">新しいテスト</div>
  </div>
  <div class="body">
    <span class="lbl">テスト名</span>
    <input class="inp" id="nt-name" placeholder="例：前期第1回" maxlength="30"/>
    <span class="lbl">科目（複数OK）</span>
    <div id="nt-chips" style="margin-bottom:16px"></div>
    <span class="lbl">写真（最大20枚）</span>
    <label class="upl" id="nt-upl">
      <input type="file" accept="image/*" multiple onchange="onPhotos(event,false)"/>
      <div style="font-size:2rem;margin-bottom:6px">📷</div>
      <div id="nt-upl-txt" style="color:#ccc;font-weight:700">タップして写真を選ぶ</div>
    </label>
    <div class="thumb-strip" id="nt-thumbs" style="display:none"></div>
    <div id="nt-prog-wrap" style="display:none">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:4px">
        <span id="nt-prog-lbl">処理中…</span><span id="nt-prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="nt-prog-fill" style="width:0%"></div></div>
      <div class="log-wrap" id="nt-log"></div>
    </div>
    <button class="btn" id="nt-gen-btn" style="background:linear-gradient(135deg,#ffd700,#ff6b35);color:#1a0a00" onclick="generateAll()" disabled>✨ AIで問題を全部作る</button>
  </div>
</div>

<!-- ADD PHOTOS -->
<div class="screen" id="addphotos">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('testdetail')">←</button>
    <div class="hdr-title">📷 問題を追加</div>
  </div>
  <div class="body">
    <span class="lbl">科目</span>
    <div id="ap-chips" style="margin-bottom:16px"></div>
    <span class="lbl">写真（最大20枚）</span>
    <label class="upl" id="ap-upl">
      <input type="file" accept="image/*" multiple onchange="onPhotos(event,true)"/>
      <div style="font-size:2rem;margin-bottom:6px">📷</div>
      <div id="ap-upl-txt" style="color:#ccc;font-weight:700">タップして写真を選ぶ</div>
    </label>
    <div class="thumb-strip" id="ap-thumbs" style="display:none"></div>
    <div id="ap-prog-wrap" style="display:none">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:4px">
        <span id="ap-prog-lbl">処理中…</span><span id="ap-prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="ap-prog-fill" style="width:0%"></div></div>
      <div class="log-wrap" id="ap-log"></div>
    </div>
    <button class="btn" id="ap-gen-btn" style="background:linear-gradient(135deg,#ffd700,#ff6b35);color:#1a0a00" onclick="apGenerateAll()" disabled>✨ AIで問題を追加する</button>
  </div>
</div>

<!-- INTRO -->
<div class="screen" id="intro">
  <div class="intro-bg" id="intro-bg"></div>
  <div class="intro-char"><img id="intro-img" src="" alt=""/></div>
  <div class="intro-bubble">
    <div id="intro-lbl" style="font-size:.68rem;font-weight:700;letter-spacing:1px;margin-bottom:5px"></div>
    <div id="intro-txt" style="font-size:.98rem;font-weight:900;line-height:1.6;margin-bottom:14px"></div>
    <button class="btn" id="intro-start-btn" onclick="beginQuiz()">スタート！⚡</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="quiz-top">
    <div>⭐ <span id="q-score" style="font-weight:900;color:#ffd700">0</span></div>
    <div class="streak-pill" id="streak-pill">🔥 0</div>
  </div>
  <div class="qprog"><div class="qprog-fill" id="qprog-fill"></div></div>
  <div class="quiz-char"><img id="quiz-char" src="" alt=""/></div>
  <div class="quiz-panel">
    <div class="qtag" id="qtag"></div>
    <div class="qtxt" id="qtxt"></div>
    <div class="choices" id="choices"></div>
    <div class="fbtxt" id="fbtxt"></div>
    <button class="btn" id="nxt-btn" style="display:none" onclick="nextQ()">つぎへ →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result" style="padding:22px 18px 40px">
  <div class="res-char"><img id="res-img" src="" alt=""/></div>
  <div class="res-title" id="res-title"></div>
  <div class="res-pts" id="res-pts">0</div>
  <div class="res-ptslbl">ポイント獲得！</div>
  <div class="res-stats">
    <div class="rstat"><div class="rl">✅ 正解</div><div class="rv" id="r-ok" style="color:#44cc88"></div></div>
    <div class="rstat"><div class="rl">❌ まちがい</div><div class="rv" id="r-ng" style="color:#ff6666"></div></div>
    <div class="rstat"><div class="rl">🔥 最高連続</div><div class="rv" id="r-str" style="color:#ffd700"></div></div>
  </div>
  <div class="res-msg" id="res-msg"></div>
  <button class="btn" id="res-retry" onclick="retryQuiz()" style="max-width:340px">もう一度！🔄</button>
  <div style="color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;text-decoration:underline" onclick="showScreen('testdetail')">テスト選択に戻る</div>
</div>

  `).join('');
}

function toggleNtSubj(k, btn){
  if(ntSelectedSubjs.includes(k)) ntSelectedSubjs=ntSelectedSubjs.filter(x=>x!==k);
  else ntSelectedSubjs.push(k);
  btn.className = 'chip '+(ntSelectedSubjs.includes(k)?'active-'+k:'');
}
function selectApSubj(k){
  apCurrentSubj=k;
  document.querySelectorAll('#ap-chips .chip').forEach(b=>{
    const subj=b.textContent.includes('理科')?'rika':b.textContent.includes('社会')?'shakai':b.textContent.includes('算数')?'sansu':'kokugo';
    b.className='chip '+(subj===k?'active-'+k:'');
  });
}

// ============================================================
// SCREENS
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHome(){
  const list=document.getElementById('test-list');
  const tests=Object.values(DB.tests).sort((a,b)=>b.createdAt-a.createdAt);
  if(tests.length===0){
    list.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--muted)"><div style="font-size:2.5rem;margin-bottom:8px">📚</div>まだテストがないよ！<br>下のボタンから作ろう！</div>`;
    return;
  }
  list.innerHTML=tests.map(t=>{
    const total=SUBJ_ORDER.reduce((s,k)=>s+(t.questions[k]?.length||0),0);
    const date=new Date(t.createdAt).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
    const subjBadges=SUBJ_ORDER.filter(k=>(t.questions[k]?.length||0)>0)
      .map(k=>`<span style="color:${CHARS[k].color};margin-left:6px">${CHARS[k].subject}:${t.questions[k].length}問</span>`).join('');
    return `<div class="test-card" onclick="openTest('${t.id}')">
      <div><div class="tc-name">${t.name}</div><div class="tc-meta">${date} / ${total}問${subjBadges}</div></div>
      <button class="tc-del" onclick="event.stopPropagation();deleteTest('${t.id}')">🗑</button>
    </div>`;
  }).join('');
}

function deleteTest(id){
  if(!confirm('このテストを削除しますか？'))return;
  delete DB.tests[id];saveDB();renderHome();showToast('削除しました','#888');
}

function openTest(id){
  currentTestId=id;
  const t=DB.tests[id];
  document.getElementById('td-title').textContent=t.name;
  const grid=document.getElementById('td-grid');
  grid.innerHTML=SUBJ_ORDER.map(subj=>{
    const c=CHARS[subj];
    const n=t.questions[subj]?.length||0;
    return `<div class="subj-card" style="border:2px solid ${c.color}44" onclick="startSubject('${subj}')">
      <img src="${IMGS[c.key].start}" alt=""/>
      <div class="si">
        <div class="si-name">${c.subject}</div>
        <div class="si-teacher" style="color:${c.color}">${c.name}</div>
        <div class="si-count">${n>0?n+'問':'問題なし'}</div>
      </div>
    </div>`;
  }).join('');
  showScreen('testdetail');
}

// ============================================================
// NEW TEST
// ============================================================
function goNewTest(){
  ntPhotos=[];ntSelectedSubjs=['rika'];
  document.getElementById('nt-name').value='';
  document.getElementById('nt-upl').classList.remove('has-files');
  document.getElementById('nt-upl-txt').textContent='タップして写真を選ぶ';
  document.getElementById('nt-thumbs').style.display='none';
  document.getElementById('nt-thumbs').innerHTML='';
  document.getElementById('nt-prog-wrap').style.display='none';
  document.getElementById('nt-log').innerHTML='';
  document.getElementById('nt-gen-btn').disabled=true;
  buildChips();
  showScreen('newtest');
}

function goAddPhotos(){
  apPhotos=[];apCurrentSubj='rika';
  document.getElementById('ap-upl').classList.remove('has-files');
  document.getElementById('ap-upl-txt').textContent='タップして写真を選ぶ';
  document.getElementById('ap-thumbs').style.display='none';
  document.getElementById('ap-thumbs').innerHTML='';
  document.getElementById('ap-prog-wrap').style.display='none';
  document.getElementById('ap-log').innerHTML='';
  document.getElementById('ap-gen-btn').disabled=true;
  buildChips();
  showScreen('addphotos');
}

function onPhotos(e, isAp){
  const files=Array.from(e.target.files).slice(0,20);
  if(!files.length)return;
  if(isAp){apPhotos=files;}else{ntPhotos=files;}
  const thumbsEl=document.getElementById(isAp?'ap-thumbs':'nt-thumbs');
  const uplEl=document.getElementById(isAp?'ap-upl':'nt-upl');
  const txtEl=document.getElementById(isAp?'ap-upl-txt':'nt-upl-txt');
  const btnEl=document.getElementById(isAp?'ap-gen-btn':'nt-gen-btn');
  txtEl.textContent=files.length+'枚選択済み';
  uplEl.classList.add('has-files');
  btnEl.disabled=false;
  thumbsEl.style.display='flex';
  thumbsEl.innerHTML='';
  const shown=files.slice(0,8);
  shown.forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{const img=document.createElement('img');img.src=ev.target.result;thumbsEl.appendChild(img);};
    reader.readAsDataURL(f);
  });
  if(files.length>8){const d=document.createElement('div');d.className='thumb-more';d.textContent='+' +(files.length-8);thumbsEl.appendChild(d);}
}

function fileToB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function callAPI(b64, subjects){
  const res=await fetch('/api/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({imageBase64:b64, subjects})
  });
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||'API error');
  return data.questions||[];
}

function addLog(el, msg, type){
  const div=document.createElement('div');
  div.className='log-'+(type||'info');
  div.textContent=msg;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

async function generateAll(){
  const name=document.getElementById('nt-name').value.trim();
  if(!name){showToast('テスト名を入力してね','#ffaa44');return;}
  if(ntSelectedSubjs.length===0){showToast('科目を選んでね','#ffaa44');return;}
  if(ntPhotos.length===0){showToast('写真を選んでね','#ffaa44');return;}

  document.getElementById('nt-gen-btn').disabled=true;
  document.getElementById('nt-prog-wrap').style.display='block';
  const logEl=document.getElementById('nt-log');
  logEl.innerHTML='';
  const fillEl=document.getElementById('nt-prog-fill');
  const pctEl=document.getElementById('nt-prog-pct');

  const testId='test_'+Date.now();
  const newTest={id:testId,name,createdAt:Date.now(),questions:{shakai:[],sansu:[],kokugo:[],rika:[]}};
  let totalQs=0;

  for(let i=0;i<ntPhotos.length;i++){
    fillEl.style.width=Math.round(i/ntPhotos.length*100)+'%';
    pctEl.textContent=Math.round(i/ntPhotos.length*100)+'%';
    const fname=ntPhotos[i].name.slice(0,20);
    try{
      const b64=await fileToB64(ntPhotos[i]);
      const qs=await callAPI(b64,ntSelectedSubjs);
      qs.forEach(q=>{
        const s=(q.subject&&newTest.questions[q.subject]!==undefined)?q.subject:ntSelectedSubjs[0];
        newTest.questions[s].push({q:q.q,a:q.a,choices:q.choices});
        totalQs++;
      });
      addLog(logEl,`✅ ${fname}: ${qs.length}問生成`,'ok');
    }catch(err){
      addLog(logEl,`❌ ${fname}: ${err.message.slice(0,60)}`,'err');
    }
  }
  fillEl.style.width='100%';pctEl.textContent='100%';
  addLog(logEl,`完了！合計 ${totalQs}問`,'info');

  DB.tests[testId]=newTest;saveDB();
  if(totalQs>0){
    spawnConfetti();
    showToast(`「${name}」に${totalQs}問追加しました🎉`,'#44cc88');
    setTimeout(()=>{currentTestId=testId;openTest(testId);},1800);
  }else{
    showToast('問題を生成できませんでした','#ff5555');
    document.getElementById('nt-gen-btn').disabled=false;
  }
}

async function apGenerateAll(){
  if(apPhotos.length===0){showToast('写真を選んでね','#ffaa44');return;}
  document.getElementById('ap-gen-btn').disabled=true;
  document.getElementById('ap-prog-wrap').style.display='block';
  const logEl=document.getElementById('ap-log');
  logEl.innerHTML='';
  const fillEl=document.getElementById('ap-prog-fill');
  const pctEl=document.getElementById('ap-prog-pct');

  const t=DB.tests[currentTestId];
  let totalQs=0;
  for(let i=0;i<apPhotos.length;i++){
    fillEl.style.width=Math.round(i/apPhotos.length*100)+'%';
    pctEl.textContent=Math.round(i/apPhotos.length*100)+'%';
    const fname=apPhotos[i].name.slice(0,20);
    try{
      const b64=await fileToB64(apPhotos[i]);
      const qs=await callAPI(b64,[apCurrentSubj]);
      qs.forEach(q=>{t.questions[apCurrentSubj].push({q:q.q,a:q.a,choices:q.choices});totalQs++;});
      addLog(logEl,`✅ ${fname}: ${qs.length}問生成`,'ok');
    }catch(err){
      addLog(logEl,`❌ ${fname}: ${err.message.slice(0,60)}`,'err');
    }
  }
  fillEl.style.width='100%';pctEl.textContent='100%';
  addLog(logEl,`完了！合計 ${totalQs}問`,'info');
  saveDB();
  if(totalQs>0){
    spawnConfetti();
    showToast(`${totalQs}問追加しました🎉`,'#44cc88');
    setTimeout(()=>openTest(currentTestId),1800);
  }else{
    showToast('問題を生成できませんでした','#ff5555');
    document.getElementById('ap-gen-btn').disabled=false;
  }
}

// ============================================================
// QUIZ
// ============================================================
function startSubject(subj){
  const t=DB.tests[currentTestId];
  const qs=t?.questions?.[subj]||[];
  if(qs.length===0){showToast('まだ問題がないよ！📷 追加してね','#ffaa44');return;}
  currentSubject=subj;
  const cfg=CHARS[subj];
  document.getElementById('intro-img').src=IMGS[cfg.key].start;
  document.getElementById('intro-lbl').textContent=cfg.subject+' — '+cfg.name;
  document.getElementById('intro-lbl').style.color=cfg.color;
  document.getElementById('intro-txt').textContent=cfg.start;
  document.getElementById('intro-start-btn').style.background=`linear-gradient(135deg,${cfg.color},${cfg.btn})`;
  document.getElementById('intro-bg').style.background=`radial-gradient(ellipse at 50% 30%,${cfg.color}22 0%,transparent 60%),var(--bg)`;
  showScreen('intro');
}

function beginQuiz(){
  const t=DB.tests[currentTestId];
  questions=[...(t.questions[currentSubject]||[])].sort(()=>Math.random()-.5);
  qIdx=0;score=0;streak=0;maxStreak=0;correct=0;wrong=0;answered=false;
  const cfg=CHARS[currentSubject];
  document.getElementById('quiz-char').src=IMGS[cfg.key].ganbaro;
  document.getElementById('qtag').textContent=cfg.subject+' — '+cfg.name;
  document.getElementById('qtag').style.color=cfg.color;
  document.getElementById('q-score').textContent='0';
  document.getElementById('streak-pill').textContent='🔥 0';
  showScreen('quiz');
  renderQ();
}

function renderQ(){
  answered=false;
  const q=questions[qIdx];
  document.getElementById('qprog-fill').style.width=(qIdx/questions.length*100)+'%';
  document.getElementById('qtxt').textContent=q.q;
  document.getElementById('fbtxt').className='fbtxt';
  document.getElementById('nxt-btn').style.display='none';
  document.getElementById('quiz-char').src=IMGS[CHARS[currentSubject].key].ganbaro;
  const choices=[...q.choices].sort(()=>Math.random()-.5);
  const grid=document.getElementById('choices');
  grid.innerHTML='';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cbtn';btn.textContent=c;
    btn.onclick=()=>doAnswer(c,q.a,btn);
    grid.appendChild(btn);
  });
}

function doAnswer(chosen,ans,btn){
  if(answered)return;
  answered=true;
  const cfg=CHARS[currentSubject];
  const isOk=chosen===ans;
  document.querySelectorAll('.cbtn').forEach(b=>{b.disabled=true;if(b.textContent===ans)b.classList.add('correct');});
  if(isOk){
    streak++;if(streak>maxStreak)maxStreak=streak;
    correct++;score+=streak>=3?streak*20:100;
    const msg=cfg.ok[Math.floor(Math.random()*cfg.ok.length)];
    showFB(streak>=3?msg+' 🔥×'+streak+' ボーナス！':msg,'ok');
    document.getElementById('quiz-char').src=IMGS[cfg.key].correct;
    if(streak>=3)spawnConfetti();
  }else{
    btn.classList.add('wrong');streak=0;wrong++;
    showFB(cfg.ng[Math.floor(Math.random()*cfg.ng.length)],'ng');
    document.getElementById('quiz-char').src=IMGS[cfg.key].wrong;
  }
  document.getElementById('q-score').textContent=score;
  document.getElementById('streak-pill').textContent='🔥 '+streak;
  const nb=document.getElementById('nxt-btn');
  nb.style.display='block';
  nb.style.background=isOk?`linear-gradient(135deg,${cfg.color},${cfg.btn})`:'#333';
}

function showFB(txt,type){
  const el=document.getElementById('fbtxt');
  el.textContent=txt;el.className='fbtxt '+type;
}

function nextQ(){qIdx++;qIdx>=questions.length?showResult():renderQ();}

function showResult(){
  const cfg=CHARS[currentSubject];
  const pct=correct/questions.length;
  let emoji,title,rk;
  if(pct>=.8){emoji='🏆';title='最高だぜ！';rk='g';document.getElementById('res-img').src=IMGS[cfg.key].correct;spawnConfetti();}
  else if(pct>=.5){emoji='👍';title='いい感じ！';rk='o';document.getElementById('res-img').src=IMGS[cfg.key].ganbaro;}
  else{emoji='💪';title='もう一回！';rk='t';document.getElementById('res-img').src=IMGS[cfg.key].wrong;}
  document.getElementById('res-title').textContent=emoji+' '+title;
  document.getElementById('res-pts').textContent=score;
  document.getElementById('res-msg').textContent='"'+cfg.res[rk]+'"';
  document.getElementById('r-ok').textContent=correct;
  document.getElementById('r-ng').textContent=wrong;
  document.getElementById('r-str').textContent=maxStreak;
  document.getElementById('res-retry').style.background=`linear-gradient(135deg,${cfg.color},${cfg.btn})`;
  showScreen('result');
}

function retryQuiz(){beginQuiz();}

function showToast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=color||'#44cc88';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

function spawnConfetti(){
  const c=document.getElementById('ccont');
  const cols=['#ffd700','#ff6b35','#44cc88','#4d96ff','#ff55aa','#cc55ff'];
  for(let i=0;i<44;i++){
    const el=document.createElement('div');el.className='cf';
    el.style.cssText=`left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1.2+Math.random()*1.2}s;animation-delay:${Math.random()*.4}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    c.appendChild(el);setTimeout(()=>el.remove(),2600);
  }
}
