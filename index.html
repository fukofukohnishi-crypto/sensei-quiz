<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>先生クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e16;--card:#18182a;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#777}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text)}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.hdr{background:#13131e;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-back{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:2px 6px}
.hdr-title{font-size:1rem;font-weight:900;color:white;flex:1}
.hdr-act{background:none;border:none;color:#ffd700;font-size:0.82rem;font-weight:700;cursor:pointer}
.body{flex:1;overflow-y:auto;padding:16px 16px 40px;-webkit-overflow-scrolling:touch}
.btn{width:100%;padding:14px;border:none;border-radius:13px;font-family:inherit;font-size:1rem;font-weight:900;cursor:pointer;color:white;margin-bottom:10px;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:white;font-family:inherit;font-size:.95rem;margin-bottom:16px;outline:none;transition:border-color .2s}
.inp:focus{border-color:#ffd700}
.lbl{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:6px;display:block}
.chip{padding:7px 14px;border-radius:99px;border:2px solid rgba(255,255,255,.12);background:var(--card);color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px;transition:all .15s}
.chip.active-shakai{border-color:#ff6666;background:rgba(255,80,80,.2);color:#ff6666}
.chip.active-sansu{border-color:#ffaa44;background:rgba(255,170,30,.2);color:#ffaa44}
.chip.active-kokugo{border-color:#6699ff;background:rgba(30,100,200,.2);color:#6699ff}
.chip.active-rika{border-color:#44cc88;background:rgba(30,160,80,.2);color:#44cc88}
.upl{width:100%;border:2px dashed rgba(255,255,255,.15);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;position:relative;margin-bottom:14px;transition:border-color .2s}
.upl.has-files{border-color:#44cc88}
.upl input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.log-wrap{background:#0a0a14;border-radius:10px;padding:12px;margin-bottom:12px;font-size:.78rem;font-family:monospace;max-height:200px;overflow-y:auto;line-height:1.8}
.log-ok{color:#44cc88}
.log-err{color:#ff6666}
.log-info{color:#ffd700}
.prog-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ff6b35);transition:width .4s}
.thumb-strip{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:6px}
.thumb-strip img{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0}
.thumb-more{width:60px;height:60px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;font-size:.75rem}
#home{background:radial-gradient(ellipse at 30% 20%,#1a0a2e,transparent 55%),radial-gradient(ellipse at 80% 80%,#0a1a2e,transparent 50%),var(--bg)}
.home-logo{font-size:2rem;font-weight:900;color:#ffd700;text-align:center;padding:28px 18px 4px}
.home-sub{color:var(--muted);font-size:.75rem;letter-spacing:2px;text-align:center;margin-bottom:20px}
.test-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start}
.tc-name{font-size:1rem;font-weight:900;margin-bottom:4px}
.tc-meta{font-size:.72rem;color:var(--muted)}
.tc-del{background:none;border:none;color:#555;cursor:pointer;font-size:1rem}
.new-btn{width:100%;padding:14px;border:2px dashed rgba(255,255,255,.15);border-radius:13px;background:transparent;color:var(--muted);font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px}
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.subj-card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .18s}
.subj-card:active{transform:scale(.97)}
.subj-card img{width:100%;height:120px;object-fit:cover;object-position:center top;display:block}
.subj-card .si{padding:8px 10px}
.subj-card .si-name{font-size:.65rem;opacity:.6}
.subj-card .si-teacher{font-size:.88rem;font-weight:900}
.subj-card .si-count{font-size:.65rem;color:var(--muted);margin-top:2px}
#intro{position:relative;overflow:hidden}
.intro-bg{position:absolute;inset:0}
.intro-char{position:absolute;bottom:185px;left:50%;transform:translateX(-50%);width:240px}
.intro-char img{width:100%}
.intro-bubble{position:relative;width:100%;background:#1a1a2e;border-top:2px solid rgba(255,255,255,.1);padding:18px 20px 28px;margin-top:auto}
#quiz{position:relative;overflow:hidden}
.quiz-top{position:absolute;top:0;left:0;right:0;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;background:linear-gradient(to bottom,rgba(14,14,22,.95),transparent)}
.streak-pill{background:rgba(255,80,80,.2);border:1px solid rgba(255,80,80,.4);border-radius:99px;padding:3px 10px;font-size:.74rem;font-weight:700;color:#ff8888}
.qprog{position:absolute;top:50px;left:0;right:0;height:3px;background:rgba(255,255,255,.08);z-index:10}
.qprog-fill{height:100%;background:linear-gradient(90deg,#4d96ff,#44cc88);transition:width .4s}
.quiz-char{position:absolute;bottom:295px;left:50%;transform:translateX(-50%);width:200px}
.quiz-char img{width:100%}
.quiz-panel{position:relative;width:100%;background:#13131e;border-top:1px solid rgba(255,255,255,.08);padding:13px 14px 20px;z-index:5;min-height:290px;margin-top:auto}
.qtag{font-size:.66rem;font-weight:700;letter-spacing:1px;margin-bottom:5px;opacity:.7}
.qtxt{font-size:.98rem;font-weight:700;line-height:1.6;margin-bottom:11px;min-height:48px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}
.cbtn{background:#1e1e32;border:2px solid rgba(255,255,255,.1);border-radius:11px;padding:10px 7px;color:var(--text);font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1.4;text-align:center;transition:all .15s}
.cbtn:active:not(:disabled){transform:scale(.96)}
.cbtn.correct{background:rgba(68,200,120,.25);border-color:#44cc88}
.cbtn.wrong{background:rgba(255,80,80,.2);border-color:#ff5555}
.cbtn:disabled{cursor:default}
.fbtxt{min-height:30px;text-align:center;font-size:.85rem;font-weight:700;padding:4px;border-radius:8px;display:none;margin-bottom:8px}
.fbtxt.ok{color:#44cc88;background:rgba(68,200,120,.1);display:block}
.fbtxt.ng{color:#ff8888;background:rgba(255,80,80,.1);display:block}
#result{justify-content:center;align-items:center;overflow-y:auto;padding:22px 18px 40px}
.res-char{width:180px;margin-bottom:4px}
.res-char img{width:100%}
.res-title{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:2px}
.res-pts{font-size:2.6rem;font-weight:900;color:#ffd700;text-align:center}
.res-ptslbl{color:var(--muted);font-size:.72rem;text-align:center;margin-bottom:16px}
.res-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;width:100%;max-width:340px}
.rstat{background:var(--card);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid var(--border)}
.rstat .rl{font-size:.62rem;color:var(--muted)}
.rstat .rv{font-size:1.25rem;font-weight:900;margin-top:2px}
.res-msg{font-size:.88rem;font-weight:700;text-align:center;margin-bottom:16px;color:#bbb;padding:0 16px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:99px;font-size:.85rem;font-weight:700;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;white-space:nowrap;color:white}
.toast.show{opacity:1}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.cf{position:absolute;top:-20px;border-radius:2px;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="confetti-c" id="ccont"></div>
<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-logo">⚡ 先生クイズ</div>
  <div class="home-sub">テストを選ぼう</div>
  <div class="body">
    <div id="test-list"></div>
    <button class="new-btn" onclick="goNewTest()">＋ 新しいテストを作る</button>
  </div>
</div>

<!-- TEST DETAIL -->
<div class="screen" id="testdetail">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('home')">←</button>
    <div class="hdr-title" id="td-title"></div>
    <button class="hdr-act" onclick="goAddPhotos()">📷 追加</button>
  </div>
  <div class="body">
    <div class="subj-grid" id="td-grid"></div>
  </div>
</div>

<!-- NEW TEST -->
<div class="screen" id="newtest">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('home')">←</button>
    <div class="hdr-title">新しいテスト</div>
  </div>
  <div class="body">
    <span class="lbl">テスト名</span>
    <input class="inp" id="nt-name" placeholder="例：前期第1回" maxlength="30"/>
    <span class="lbl">科目（複数OK）</span>
    <div id="nt-chips" style="margin-bottom:16px"></div>
    <span class="lbl">写真（最大20枚）</span>
    <label class="upl" id="nt-upl">
      <input type="file" accept="image/*" multiple onchange="onPhotos(event,false)"/>
      <div style="font-size:2rem;margin-bottom:6px">📷</div>
      <div id="nt-upl-txt" style="color:#ccc;font-weight:700">タップして写真を選ぶ</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:3px">プリント・教科書（最大20枚）</div>
    </label>
    <div class="thumb-strip" id="nt-thumbs" style="display:none"></div>
    <div id="nt-prog-wrap" style="display:none">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:4px">
        <span id="nt-prog-lbl">処理中…</span><span id="nt-prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="nt-prog-fill" style="width:0%"></div></div>
      <div class="log-wrap" id="nt-log"></div>
    </div>
    <button class="btn" id="nt-gen-btn" style="background:linear-gradient(135deg,#ffd700,#ff6b35);color:#1a0a00" onclick="generateAll()" disabled>✨ AIで問題を全部作る</button>
  </div>
</div>

<!-- ADD PHOTOS -->
<div class="screen" id="addphotos">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('testdetail')">←</button>
    <div class="hdr-title">📷 問題を追加</div>
  </div>
  <div class="body">
    <span class="lbl">科目</span>
    <div id="ap-chips" style="margin-bottom:16px"></div>
    <span class="lbl">写真（最大20枚）</span>
    <label class="upl" id="ap-upl">
      <input type="file" accept="image/*" multiple onchange="onPhotos(event,true)"/>
      <div style="font-size:2rem;margin-bottom:6px">📷</div>
      <div id="ap-upl-txt" style="color:#ccc;font-weight:700">タップして写真を選ぶ</div>
    </label>
    <div class="thumb-strip" id="ap-thumbs" style="display:none"></div>
    <div id="ap-prog-wrap" style="display:none">
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:4px">
        <span id="ap-prog-lbl">処理中…</span><span id="ap-prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="ap-prog-fill" style="width:0%"></div></div>
      <div class="log-wrap" id="ap-log"></div>
    </div>
    <button class="btn" id="ap-gen-btn" style="background:linear-gradient(135deg,#ffd700,#ff6b35);color:#1a0a00" onclick="apGenerateAll()" disabled>✨ AIで問題を追加する</button>
  </div>
</div>

<!-- INTRO -->
<div class="screen" id="intro">
  <div class="intro-bg" id="intro-bg"></div>
  <div class="intro-char"><img id="intro-img" src="" alt=""/></div>
  <div class="intro-bubble">
    <div id="intro-lbl" style="font-size:.68rem;font-weight:700;letter-spacing:1px;margin-bottom:5px"></div>
    <div id="intro-txt" style="font-size:.98rem;font-weight:900;line-height:1.6;margin-bottom:14px"></div>
    <button class="btn" id="intro-start-btn" onclick="beginQuiz()">スタート！⚡</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="quiz-top">
    <div>⭐ <span id="q-score" style="font-weight:900;color:#ffd700">0</span></div>
    <div class="streak-pill" id="streak-pill">🔥 0</div>
  </div>
  <div class="qprog"><div class="qprog-fill" id="qprog-fill"></div></div>
  <div class="quiz-char"><img id="quiz-char" src="" alt=""/></div>
  <div class="quiz-panel">
    <div class="qtag" id="qtag"></div>
    <div class="qtxt" id="qtxt"></div>
    <div class="choices" id="choices"></div>
    <div class="fbtxt" id="fbtxt"></div>
    <button class="btn" id="nxt-btn" style="display:none" onclick="nextQ()">つぎへ →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="res-char"><img id="res-img" src="" alt=""/></div>
  <div class="res-title" id="res-title"></div>
  <div class="res-pts" id="res-pts">0</div>
  <div class="res-ptslbl">ポイント獲得！</div>
  <div class="res-stats">
    <div class="rstat"><div class="rl">✅ 正解</div><div class="rv" id="r-ok" style="color:#44cc88"></div></div>
    <div class="rstat"><div class="rl">❌ まちがい</div><div class="rv" id="r-ng" style="color:#ff6666"></div></div>
    <div class="rstat"><div class="rl">🔥 最高連続</div><div class="rv" id="r-str" style="color:#ffd700"></div></div>
  </div>
  <div class="res-msg" id="res-msg"></div>
  <button class="btn" id="res-retry" onclick="retryQuiz()" style="max-width:340px">もう一度！🔄</button>
  <div style="color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;text-decoration:underline;text-align:center" onclick="showScreen('testdetail')">テスト選択に戻る</div>
</div>

<script src="app.js"></script>
</body>
</html>
